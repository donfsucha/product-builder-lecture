<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>가위, 바위, 보 중 하나를 선택하세요!</h1>
        <div class="button-container">
            <button id="scissors">
                <img src="https://raw.githubusercontent.com/hfg-gmuend/openmoji/master/color/svg/270C.svg" alt="가위" width="100">
                <p>가위</p>
            </button>
            <button id="rock">
                <img src="https://raw.githubusercontent.com/hfg-gmuend/openmoji/master/color/svg/270A.svg" alt="바위" width="100">
                <p>바위</p>
            </button>
            <button id="paper">
                <img src="https://raw.githubusercontent.com/hfg-gmuend/openmoji/master/color/svg/270B.svg" alt="보" width="100">
                <p>보</p>
            </button>
        </div>
        <div id="result">결과가 여기에 표시됩니다.</div>
    </div>

    <div class="form-container">
        <h2>제휴 문의</h2>
        <p>함께 비즈니스를 키워나갈 파트너를 찾습니다.</p>
        <!-- Formspree action을 본인의 ID로 교체하세요 -->
        <form action="https://formspree.io/f/sample" method="POST">
            <div class="input-group">
                <label for="name">성함</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="input-group">
                <label for="company">회사명 (선택)</label>
                <input type="text" id="company" name="company" placeholder="(주)가위바위보">
            </div>
            <div class="input-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="제휴 제안 내용을 적어주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>

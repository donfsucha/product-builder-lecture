<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>가위, 바위, 보 중 하나를 선택하세요!</h1>
    <div class="button-container">
        <button id="scissors">
            <img src="https://img.icons8.com/doodle/100/scissors.png" alt="가위" width="100">
            <p>가위</p>
        </button>
        <button id="rock">
            <img src="https://img.icons8.com/doodle/100/fist.png" alt="바위" width="100">
            <p>바위</p>
        </button>
        <button id="paper">
            <img src="https://img.icons8.com/doodle/100/hand.png" alt="보" width="100">
            <p>보</p>
        </button>
    </div>
    <div id="result">결과가 여기에 표시됩니다.</div>
    <script src="main.js"></script>
</body>
</html>
